name: 🐛 Bug Report
description: Report something that is broken or not working as expected
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out this form as completely as possible so we can help you quickly.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Before submitting, please confirm the following
      options:
        - label: I have searched the [existing issues](https://github.com/abir2afridi/TextProcessing-Toolkit/issues) to make sure this bug has not been reported yet
          required: true
        - label: I have tested the latest version of the toolkit to confirm the bug still exists
          required: true
        - label: I have checked the browser console for errors and included them below
          required: true

  - type: input
    id: tool
    attributes:
      label: Affected Tool
      description: Which tool are you having trouble with? (e.g., "Case Converter", "JSON Formatter")
      placeholder: e.g., Base64 Encode/Decode
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clearly describe what the bug is
      placeholder: Tell us what happened instead of what you expected
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to tool '...'
        2. Paste this input: '...'
        3. Click on '...'
        4. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Sample Input
      description: If applicable, provide the text input that triggers the bug (sensitive data removed)
      placeholder: Paste the text that causes the issue
      render: text

  - type: textarea
    id: logs
    attributes:
      label: Browser Console Output
      description: Open your browser's developer tools (F12 → Console), reproduce the bug, and paste any errors/warnings here
      placeholder: No errors in console
      render: text

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical — toolkit crashes or becomes unusable
        - Major — tool output is incorrect
        - Minor — cosmetic or layout issue
        - Trivial — typo or very minor inconvenience
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser were you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Brave
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Windows 11, macOS 14, Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      description: What version appears in the header badge? (e.g., "v1.0")
      placeholder: v1.0

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Recordings
      description: If applicable, add screenshots or screen recordings to help explain the problem
      placeholder: Drag and drop images here

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might help? Related issues, etc.
      placeholder: Add links or references here

  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow the project's guidelines
      options:
        - label: I agree to follow this project's [Code of Conduct](../../CODE_OF_CONDUCT.md)
          required: true
